name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  code-quality-and-tests:
    name: Linting & Testing
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
    
    - name: Configurar Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Revisión de Formato (Black)
      run: black --check .
      
    - name: Revisión de Imports (isort)
      run: isort --check-only .
      
    - name: Análisis estático (Ruff)
      run: ruff check .
      
    - name: Pruebas Unitarias y Coverage (Pytest)
      run: pytest --cov=api --cov=ml --cov-report=term-missing

  docker-build-check:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: code-quality-and-tests 

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Probar compilación de imagen API
      run: docker build -t churn-api:test -f api.Dockerfile .

    - name: Probar compilación de imagen UI
      run: docker build -t churn-ui:test -f ui.Dockerfile .